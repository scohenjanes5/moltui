name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install project and test dependencies
        run: uv sync --extra test

      - name: Run test suite
        run: uv run pytest tests

  tests-pyscf:
    name: Tests with PySCF (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install project and test dependencies (with PySCF)
        run: uv sync --extra test-pyscf

      - name: Run PySCF comparison tests
        run: uv run pytest tests/test_gto.py

  tests-trexio:
    name: Tests with TREXIO (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install project, tests, and TREXIO
        run: uv sync --extra test-trexio

      - name: Run TREXIO-related tests
        run: uv run pytest tests/test_trexio_parser.py tests/test_filetype.py tests/test_app_trexio_mo.py
